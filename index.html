<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一七之内 - 跳转页</title>

<!-- GA4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-S55FRR3FM6"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-S55FRR3FM6', { send_page_view: false });
</script>

<style>
body {
  margin:0;
}

/* 遮罩层 */
.mask {
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.9);
  display:none;

  display:flex;
  justify-content:center;
  align-items:center;
}

/* 图片 */
img {
  max-width:90%;
  border-radius:12px;
}

/* 底部文字 */
.bottom-text {
  position:absolute;
  bottom:20px;
  left:0;
  width:100%;
  text-align:center;
  color:#fff;
  font-size:14px;
  opacity:0.8;
  padding:0 20px;
}
</style>
</head>

<body>

<div id="mask" class="mask">
  <img id="guideImg" src="">
  <div class="bottom-text">
    本页面UI设计参考领受这道网站，侵权删
  </div>
</div>

<script>
// ===== 获取 target 参数 =====
function getTarget() {
  const params = new URLSearchParams(window.location.search);
  return params.get("target");
}

// ===== 设备判断 =====
function getDevice() {
  var ua = navigator.userAgent.toLowerCase();
  if (/iphone|ipad|ipod/.test(ua)) return "ios";
  if (/android/.test(ua)) return "android";
  return "desktop";
}

// ===== 微信判断 =====
function isWeChat() {
  return /micromessenger/i.test(navigator.userAgent);
}

var device = getDevice();
var inWeChat = isWeChat();
var key = getTarget();

// ===== 安全统计函数（防 GA 未加载报错）=====
function track(name) {
  if (typeof gtag === "function") {
    gtag('event', name, {
      device: device,
      in_wechat: inWeChat ? 1 : 0,
      target: key || 'default'
    });
  }
}

// ===== 页面访问 =====
track('page_view_redirect');

// ===== 微信内逻辑 =====
if (inWeChat) {

  document.getElementById("mask").style.display = "flex";

  var img = document.getElementById("guideImg");

  if (device === "ios") {
    img.src = "ios.jpg";
  } else {
    img.src = "android.jpg";
  }

  // 记录：微信曝光（带来源）
  track('wechat_view_' + (key || 'default'));

} else {

  // ===== 目标映射 =====
  var targetMap = {
    "a": "https://jh144000.com/posts/biblical-love/",
    "b": "https://jh144000.com/page2",
    "c": "https://jh144000.com/page3"
  };

  var targetUrl = targetMap[key] || "https://jh144000.com";

  // 记录：跳转成功（带来源）
  track('redirect_success_' + (key || 'default'));

  // 延迟跳转（保证统计发送）
  setTimeout(function() {
    window.location.href = targetUrl;
  }, 300);
}
</script>

</body>
</html>
